service: user-posts-portal-api

build:
  esbuild: false

package:
  patterns:
    - 'dist/**'
    - 'node_modules/**'
    - '!node_modules/@types/**'
    - '!node_modules/typescript/**'
    - '!node_modules/@nestjs/cli/**'
    - '!node_modules/@nestjs/schematics/**'
    - '!node_modules/jest/**'
    - '!node_modules/ts-jest/**'
    - '!node_modules/supertest/**'
    - '!test/**'
    - '!src/**'

provider:
  name: aws
  runtime: nodejs20.x
  stage: ${opt:stage, 'dev'}
  region: ${opt:region, 'us-east-1'}
  memorySize: 512
  timeout: 29
  environment:
    NODE_ENV: production
    MONGODB_URI: ${env:MONGODB_URI}
    REQRES_BASE_URL: https://reqres.in/api
    REQRES_API_KEY: ${env:REQRES_API_KEY}
    CORS_ORIGIN: ${env:CORS_ORIGIN, '*'}

functions:
  api:
    handler: dist/lambda.handler
    events:
      - http:
          method: ANY
          path: /
          cors: true
      - http:
          method: ANY
          path: '{proxy+}'
          cors: true

plugins:
  - serverless-offline

custom:
  serverless-offline:
    httpPort: 4000
    noPrependStageInUrl: true
